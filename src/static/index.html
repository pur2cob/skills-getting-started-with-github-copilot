<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergington High School - Extracurricular Activities</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Mergington High School</h1>
        <h2>Extracurricular Activities</h2>
    </header>

    <main>
        <section id="activities-section">
            <h3>Available Activities</h3>
            <div id="activities-container">
                <!-- Activities will be loaded here by JavaScript -->
            </div>
        </section>

        <section id="signup-section">
            <h3>Sign Up for an Activity</h3>
            <form id="signup-form">
                <div class="form-group">
                    <label for="activity-select">Select Activity:</label>
                    <select id="activity-select" required>
                        <option value="">Choose an activity...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="email-input">Your Email:</label>
                    <input type="email" id="email-input" placeholder="your.name@mergington.edu" required>
                </div>
                <button type="submit">Sign Up</button>
            </form>
            <div id="message" class="message"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Mergington High School. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
